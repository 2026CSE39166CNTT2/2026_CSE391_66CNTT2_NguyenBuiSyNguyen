<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Record - Anne Dodsworth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #333;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .form-container {
            background: #fff;
            width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h3 {
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
            margin-top: 25px;
            font-size: 16px;
        }
        .form-group {
            display: flex;
            margin-bottom: 8px;
            align-items: center;
        }
        .form-group label {
            width: 150px;
            font-weight: bold;
        }
        .form-group input[type="text"], 
        .form-group select, 
        .form-group textarea {
            flex: 1;
            padding: 4px;
            border: 1px solid #999;
        }
        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
        }
        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
            font-weight: normal;
        }
        .radio-item input, .checkbox-item input {
            margin-right: 10px;
        }
        .notes-box {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 100px;
            background: #fff;
        }
        .captcha-area {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            letter-spacing: 5px;
            margin: 10px 0;
            font-weight: bold;
            color: #555;
        }
        .footer-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .btn {
            padding: 5px 15px;
            cursor: pointer;
            border: 1px solid #333;
            color: white;
            font-weight: bold;
        }
        .btn-submit { background-color: #444; }
        .btn-cancel { background-color: #444; }
        .notes-container {
        border: 1px solid #ccc;
        background-color: #fff;
        width: 100%;
    }
    
    .toolbar {
        background-color: #f0f0f0;
        border-bottom: 1px solid #ccc;
        padding: 5px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
    }

    .toolbar-group {
        display: flex;
        border-right: 1px solid #ccc;
        padding-right: 5px;
        margin-right: 2px;
        align-items: center;
    }

    .tool-btn {
        padding: 2px 5px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid transparent;
        background: none;
        color: #444;
        font-weight: bold;
    }

    .tool-btn:hover {
        background-color: #e2e2e2;
        border: 1px solid #bbb;
    }

    .notes-content {
        padding: 10px;
        min-height: 120px;
        font-family: "Times New Roman", Times, serif;
        font-size: 16px;
        line-height: 1.4;
        outline: none;
    }

    .red-x { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Basic Info</h3>
    <div class="form-group">
        <label>Employee ID</label>
        <span>9</span>
    </div>
    <div class="form-group">
        <label>Last Name</label>
        <span>Dodsworth</span>
    </div>
    <div class="form-group">
        <label>First Name</label>
        <input type="text" value="Anne">
    </div>
    <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
            <label class="radio-item"><input type="radio" name="gender"> Male</label>
            <label class="radio-item"><input type="radio" name="gender"> Female</label>
            <label class="radio-item"><input type="radio" name="gender"> XXX</label>
            <label class="radio-item"><input type="radio" name="gender" checked> ZZZ</label>
        </div>
    </div>
    <div class="form-group">
        <label>Title</label>
        <input type="text" value="Sales Representative">
    </div>
    <div class="form-group">
        <label>Suffix</label>
        <input type="text" value="Ms.">
    </div>
    <div class="form-group">
        <label>BirthDate</label>
        <input type="text" value="1969-07-02 00:00:00">
    </div>
    <div class="form-group">
        <label>HireDate</label>
        <input type="text" value="1994-11-15 00:00:00">
    </div>
    <div class="form-group">
        <label>SSN #</label>
        <input type="text" value="">
    </div>
    <div class="form-group">
        <label>Reports To</label>
        <select>
            <option>Buchanan</option>
        </select>
    </div>

    <h3>Contact Info</h3>
    <div class="form-group">
        <label>Email</label>
        <input type="text" placeholder="name@example.com">
    </div>
    <div class="form-group">
        <label>Address</label>
        <input type="text" value="7 Houndstooth Rd.">
    </div>
    <div class="form-group">
        <label>City</label>
        <input type="text" value="London">
    </div>
    <div class="form-group">
        <label>Region</label>
        <input type="text" value="">
    </div>
    <div class="form-group">
        <label>Postal Code</label>
        <input type="text" value="WG2 7LT">
    </div>
    <div class="form-group">
        <label>Country</label>
        <select>
            <option>Russian Federation</option>
        </select>
    </div>
    <div class="form-group">
        <label>US Home Phone</label>
        <input type="text" value="(234)234-2342">
    </div>

    <h3>Optional Info</h3>
    <div class="form-group" style="align-items: flex-start;">
    <label>Notes</label>
    <div class="notes-container">
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="tool-btn">B</button>
                <button class="tool-btn"><i>I</i></button>
                <button class="tool-btn"><strike>S</strike></button>
                <button class="tool-btn"><u>U</u></button>
            </div>
            <div class="toolbar-group">
                <button class="tool-btn">≡</button>
                <button class="tool-btn">≣</button>
                <button class="tool-btn" style="text-align: right;">≡</button>
            </div>
            <div class="toolbar-group">
                <button class="tool-btn">X₂</button>
                <button class="tool-btn">X²</button>
            </div>
            <div class="toolbar-group">
                <button class="tool-btn">H1</button>
                <button class="tool-btn">H2</button>
                <button class="tool-btn">H3</button>
                <button class="tool-btn red-x">✘</button>
            </div>
        </div>
        
        <div class="notes-content" contenteditable="true">
            Anne has a BA degree in English from St. Lawrence College. 
            She is fluent in French and German.ZZZ
        </div>
    </div>
</div>
    <div class="form-group">
        <label>Preferred Shift</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox"> Regular</label>
            <label class="checkbox-item"><input type="checkbox" checked> Gravy Yard</label>
        </div>
    </div>
    <div class="form-group">
        <label>Active?</label>
        <input type="checkbox" checked>
    </div>

    <div class="form-group">
        <label>Are you human?</label>
        <div>
            <div class="captcha-area">T I D A W O</div>
            <input type="text" style="width: 100%;">
        </div>
    </div>

    <div class="footer-buttons">
        <button class="btn btn-submit">Submit</button>
        <button class="btn btn-cancel">Cancel</button>
    </div>
</div>

</body>
</html>
