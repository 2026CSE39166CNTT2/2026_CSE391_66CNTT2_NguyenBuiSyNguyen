<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Management Dashboard</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-bg: #212529;
            --edit-yellow: #ffc107;
            --delete-red: #dc3545;
            --save-green: #198754;
            --light-gray: #f8f9fa;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #e9ecef;
        }
        nav {
            background-color: var(--dark-bg);
            color: white;
            padding: 10px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links h2 { margin: 0; padding-right: 20px; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 14px; }

        .search-box { display: flex; gap: 5px; }
        .search-box input { border-radius: 4px; border: 1px solid #ccc; padding: 5px 10px; width: 200px; }
        .search-box button { background: none; border: 1px solid #ccc; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        .container {
            background: white;
            margin: 30px auto;
            width: 90%;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .header-table {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-add {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            border-bottom: 2px solid #dee2e6;
            padding: 12px;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
        }

        .btn-action {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }
        .btn-edit { background-color: var(--edit-yellow); color: #000; }
        .btn-delete { background-color: var(--delete-red); }
        .modal {
            width: 600px;
            margin: 50px auto;
            border: 1px solid #007bff;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .modal-header {
            background-color: var(--primary-blue);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select {
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-group label { font-weight: normal; color: #333; display: flex; align-items: center; gap: 5px; }

        .modal-footer {
            padding: 10px 20px;
            text-align: right;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }

        .btn-save { background-color: var(--save-green); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <h2>HR Management</h2>
            <a href="#">Home</a>
            <a href="#">Contact</a>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <button>Search</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-table">
            <h1 style="margin: 0; font-size: 24px;">Employee</h1>
            <button class="btn-add">+ Add</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Position</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Fatima Beatriz</td>
                    <td>Fatima Beatriz@gmail.com</td>
                    <td>0985674321</td>
                    <td>Staff</td>
                    <td>
                        <button class="btn-action btn-edit">Edit</button>
                        <button class="btn-action btn-delete">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Gabriel Hanna</td>
                    <td>Gabriel Hanna@gmail.com</td>
                    <td>0353674231</td>
                    <td>Staff</td>
                    <td>
                        <button class="btn-action btn-edit">Edit</button>
                        <button class="btn-action btn-delete">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Frank Lamdo</td>
                    <td>Frank Lamdo@gmail.com</td>
                    <td>0975444768</td>
                    <td>Manager</td>
                    <td>
                        <button class="btn-action btn-edit">Edit</button>
                        <button class="btn-action btn-delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal">
        <div class="modal-header">
            <span>New Employee</span>
            <span style="cursor: pointer;">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Name</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Position</label>
                <select>
                    <option>-- Select Position --</option>
                    <option>Staff</option>
                    <option>Manager</option>
                    <option>CEO</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Sex</label>
                <div class="radio-group">
                    <label><input type="radio" name="sex"> Male</label>
                    <label><input type="radio" name="sex"> Female</label>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-save">Save</button>
            <button class="btn-cancel">Cancel</button>
        </div>
    </div>

</body>
</html>
